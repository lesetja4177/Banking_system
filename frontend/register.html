<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Platinum Non Resident Account</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0a2a43, #0f4c75);
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    background: #0f4c75;
    color: white;
    padding: 15px 20px;
}

.nav-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-flex a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-size: 14px;
}

.btn-bank {
    background: #10b981;
    padding: 8px 12px;
    border-radius: 6px;
}

/* MAIN CENTER */
.main {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 70px);
}

/* Container */
.wrapper {
    width: 95%;
    max-width: 1000px;
    display: flex;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

/* Left side */
.left {
    flex: 1;
    background: #0f4c75;
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

/* Right side */
.right {
    flex: 1;
    padding: 30px;
}

.right h2 {
    margin-bottom: 15px;
}

/* Grid form */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    resize: none;
    height: 60px;
}

.full {
    grid-column: span 2;
}

button {
    width: 100%;
    padding: 12px;
    background: #0f4c75;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #0a2a43;
}

.link {
    text-align: center;
    margin-top: 10px;
}

/* LOADING SPINNER */
.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ccc;
    border-top: 4px solid #0f4c75;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% {
        transform: rotate(360deg);
    }
}

/* Mobile */
@media (max-width: 768px) {
    .wrapper {
        flex-direction: column;
    }

    .left {
        display: none;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    .full {
        grid-column: span 1;
    }

    .nav-flex {
        flex-direction: column;
        gap: 10px;
    }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
<div class="nav-flex">
    <h2>💰 Platinum Non Resident Account</h2>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</div>
</header>

<!-- MAIN -->
<div class="main">
<div class="wrapper">

    <!-- LEFT -->
    <div class="left">
        <h1>Platinum Non Resident Account</h1>
        <p>Create a secure account and manage your money easily.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>Create Account</h2>

        <div class="form-grid">

            <input type="text" id="username" placeholder="Username">
            <input type="email" id="email" placeholder="Email">

            <input type="text" id="telephone" placeholder="Phone Number">
            <input type="text" id="full_name" placeholder="Full Name">

            <textarea id="address" class="full" placeholder="Address"></textarea>

            <select id="country" class="full">
                <option value="">Loading countries...</option>
            </select>

            <input type="password" id="password" placeholder="Password" class="full">

        </div>

        <button onclick="register()">Register</button>

        <div class="link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

</div>
</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:9999;
    justify-content:center;
    align-items:center;
">

    <div style="
        background:white;
        padding:20px;
        border-radius:10px;
        text-align:center;
    ">
        <div class="spinner"></div>
        <p style="margin-top:10px;">Creating your account...</p>
    </div>

</div>

<script>
const API_URL = "http://127.0.0.1:8000/api/accounts";

/* Load countries */
fetch("https://restcountries.com/v3.1/all?fields=name")
.then(res => {
    if (!res.ok) throw new Error("Network error");
    return res.json();
})
.then(data => {
    const select = document.getElementById("country");
    select.innerHTML = '<option value="">Select Country</option>';

    data.sort((a, b) => a.name.common.localeCompare(b.name.common));

    data.forEach(country => {
        const option = document.createElement("option");
        option.value = country.name.common;
        option.textContent = country.name.common;
        select.appendChild(option);
    });
})
.catch(() => {
    document.getElementById("country").innerHTML =
        '<option value="">Failed to load countries</option>';
});

/* Register */
async function register() {

    const overlay = document.getElementById("loadingOverlay");

    const data = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        telephone: document.getElementById("telephone").value,
        full_name: document.getElementById("full_name").value,
        address: document.getElementById("address").value,
        country: document.getElementById("country").value,
        password: document.getElementById("password").value
    };

    for (let key in data) {
        if (!data[key]) {
            alert("Please fill all fields");
            return;
        }
    }

    // SHOW LOADER
    overlay.style.display = "flex";

    try {
        const res = await fetch(`${API_URL}/register/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const response = await res.json();

        if (res.ok) {
            localStorage.setItem("token", response.token);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {
            overlay.style.display = "none";
            alert(JSON.stringify(response));
        }

    } catch (error) {
        overlay.style.display = "none";
        alert("Server error");
    }
}
</script>

</body>
</html>
